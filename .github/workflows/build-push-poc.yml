# L3 bootstrap: build and push PoC images to ECR (not Phase 4 deploy)
name: build-push-poc

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: aws-dev
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push backend
        id: backend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: viewer/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/covenant-pipeline-backend:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/covenant-pipeline-backend:poc
          provenance: false

      - name: Build and push frontend
        id: frontend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./viewer/frontend
          file: viewer/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/covenant-pipeline-frontend:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/covenant-pipeline-frontend:poc
          provenance: false

      - name: Emit immutable digests
        run: |
          echo "commit_sha=${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "backend_digest=${{ steps.backend.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "frontend_digest=${{ steps.frontend.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "backend_image=${{ steps.ecr.outputs.registry }}/covenant-pipeline-backend@${{ steps.backend.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "frontend_image=${{ steps.ecr.outputs.registry }}/covenant-pipeline-frontend@${{ steps.frontend.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
