name: PE docs mirror check

# Verifies that the mirrored platform-engineering docs under
# docs/platform-engineering/ match their canonical sources in the notes repo.
# The canonical files live in a separate repo, so this workflow checks it out
# alongside covenant_pipeline and runs the sync script in --check mode.
#
# Requirement: a repo/organization secret NOTES_REPO_TOKEN with read access to
# the notes repo (a fine-grained PAT or deploy key). If the notes repo is
# public, the default GITHUB_TOKEN may suffice and the `token:` line can be
# removed.

on:
  pull_request:
    paths:
      - "docs/platform-engineering/**"
      - ".github/workflows/mirror-check.yml"
  push:
    branches: [main]
    paths:
      - "docs/platform-engineering/**"

jobs:
  mirror-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout covenant_pipeline
        uses: actions/checkout@v4
        with:
          path: covenant_pipeline

      - name: Checkout notes (canonical sources)
        uses: actions/checkout@v4
        with:
          repository: endisciple13/notes
          token: ${{ secrets.NOTES_REPO_TOKEN }}
          path: notes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check mirrors are in sync
        run: python3 notes/scripts/sync_pe_docs.py --check
